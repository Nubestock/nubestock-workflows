# Workflow reutilizable: build y deploy de Azure Static Web App
# Variables de build (VITE_*) se toman del environment y se inyectan en el build.
name: Deploy Azure Static Web App - Reusable Workflow

on:
  workflow_call:
    inputs:
      environment:
        description: "Environment a desplegar (ej. NUBESTOCK_DEV, NUBESTOCK_UAT, NUBESTOCK_PRD)"
        required: true
        type: string
      node_version:
        description: "Versión de Node.js para el build"
        required: false
        type: string
        default: "20"
      app_location:
        description: "Ruta del código de la app (relativa al repo)"
        required: false
        type: string
        default: "/"
      output_location:
        description: "Carpeta de salida del build (ej. dist)"
        required: false
        type: string
        default: "dist"
    secrets:
      # Token de deploy del Static Web App (desde Azure Portal)
      AZURE_STATIC_WEB_APPS_API_TOKEN:
        required: true
      # Variables de build (Vite/React) - se inyectan en el build desde el environment
      VITE_API_BASE_URL:
        required: false
      VITE_API_TIMEOUT:
        required: false
      # Código para invocar el backend (?code=). Mismo valor que APP_KEY del backend.
      VITE_API_CODE:
        required: false
      # Token de SonarCloud para análisis de calidad
      SONAR_TOKEN:
        required: false

env:
  NODE_VERSION: ${{ inputs.node_version }}
  APP_LOCATION: ${{ inputs.app_location }}
  OUTPUT_LOCATION: ${{ inputs.output_location }}

# ============================================================================
# PIPELINE: quality → build → deploy
# ============================================================================

jobs:
  # ==========================================================================
  # STAGE 1: QUALITY (tests + Sonar)
  # ==========================================================================
  quality:
    name: Quality (tests + Sonar)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment:
      name: ${{ inputs.environment }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
        env:
          NODE_OPTIONS: '--experimental-vm-modules'

      - name: Debug Sonar Configuration
        run: |
          echo "=== DEBUG SONAR CONFIGURATION ==="
          echo "Checking sonar-project.properties..."
          if [ -f "sonar-project.properties" ]; then
            echo "File exists!"
            echo "Project Key: $(grep '^sonar.projectKey=' sonar-project.properties | cut -d= -f2)"
            echo "Organization: $(grep '^sonar.organization=' sonar-project.properties | cut -d= -f2)"
          else
            echo "ERROR: sonar-project.properties NOT FOUND!"
          fi
          echo ""
          echo "Checking SONAR_TOKEN..."
          if [ -n "$SONAR_TOKEN" ]; then
            TOKEN_LENGTH=${#SONAR_TOKEN}
            TOKEN_PREFIX=${SONAR_TOKEN:0:4}
            TOKEN_SUFFIX=${SONAR_TOKEN: -4}
            echo "SONAR_TOKEN is SET (length: $TOKEN_LENGTH, preview: ${TOKEN_PREFIX}...${TOKEN_SUFFIX})"
          else
            echo "ERROR: SONAR_TOKEN is EMPTY or NOT SET!"
          fi
          echo "================================="
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Wait for Sonar analysis
        run: sleep 15

    #  - name: Validate Sonar conditions
    #    run: |
     #     PROJECT_KEY=$(grep '^sonar.projectKey=' sonar-project.properties | cut -d= -f2)
      #    echo "Getting metrics for component: $PROJECT_KEY"
       #   METRICS=$(curl -s -u "$SONAR_TOKEN": \
     #       "https://sonarcloud.io/api/measures/component?component=$PROJECT_KEY&metricKeys=coverage,bugs,vulnerabilities")
#
 #         COVERAGE=$(echo "$METRICS" | jq -r '.component.measures[] | select(.metric=="coverage") | .value // "0"')
  #        BUGS=$(echo "$METRICS" | jq -r '.component.measures[] | select(.metric=="bugs") | .value // "0"')
  #        VULNERABILITIES=$(echo "$METRICS" | jq -r '.component.measures[] | select(.metric=="vulnerabilities") | .value // "0"')
#
#          COVERAGE=${COVERAGE:-0}
#          BUGS=${BUGS:-0}
#          VULNERABILITIES=${VULNERABILITIES:-0}
#
#          echo "Coverage: $COVERAGE%"
#          echo "Bugs: $BUGS"
#          echo "Vulnerabilities: $VULNERABILITIES"
#
#          FAIL=0
#
#          if (( $(echo "$COVERAGE < 80" | bc -l) )); then
#            echo "Coverage below 80%"
#            FAIL=1
#          fi
#
#          if [ "$BUGS" -gt 1 ]; then
#            echo "More than 1 bug detected"
#            FAIL=1
 #         fi

  #        if [ "$VULNERABILITIES" -gt 0 ]; then
 #           echo "Security vulnerabilities detected"
 #           FAIL=1
 #         fi

 #         if [ "$FAIL" -eq 1 ]; then
 #           echo "Sonar validation failed"
 #           exit 1
 #         else
 #           echo "Sonar validation passed"
 #         fi
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ==========================================================================
  # STAGE 2: BUILD
  # ==========================================================================
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: quality
    permissions:
      contents: read
    environment:
      name: ${{ inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (con variables del environment)
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_API_TIMEOUT: ${{ secrets.VITE_API_TIMEOUT }}
          VITE_API_CODE: ${{ secrets.VITE_API_CODE }}
        run: npm run build

      - name: Generate staticwebapp.config.json (SPA fallback + proxy opcional)
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
        run: |
          # Siempre generar config con navigationFallback para que rutas como /reset-password sirvan index.html (SPA)
          if [ -n "$VITE_API_BASE_URL" ]; then
            cat > ${{ env.OUTPUT_LOCATION }}/staticwebapp.config.json << EOF
          {
            "routes": [
              {
                "route": "/api/*",
                "rewrite": "${VITE_API_BASE_URL}/*"
              }
            ],
            "navigationFallback": {
              "rewrite": "/index.html"
            }
          }
          EOF
            echo "staticwebapp.config.json generado (proxy + SPA fallback). Backend: $VITE_API_BASE_URL"
          else
            cat > ${{ env.OUTPUT_LOCATION }}/staticwebapp.config.json << 'EOF'
          {
            "navigationFallback": {
              "rewrite": "/index.html"
            }
          }
          EOF
            echo "staticwebapp.config.json generado (solo SPA fallback para /reset-password, etc.)"
          fi
          cat ${{ env.OUTPUT_LOCATION }}/staticwebapp.config.json

      - name: Verify build output
        run: |
          echo "Verificando estructura de archivos compilados..."
          if [ ! -d "${{ env.OUTPUT_LOCATION }}" ]; then
            echo "ERROR: La carpeta '${{ env.OUTPUT_LOCATION }}' no existe después del build"
            exit 1
          fi
          echo "Carpeta '${{ env.OUTPUT_LOCATION }}' encontrada"
          
          # Verificar que existen archivos compilados
          FILE_COUNT=$(find ${{ env.OUTPUT_LOCATION }} -type f | wc -l)
          echo "Total archivos en ${{ env.OUTPUT_LOCATION }}: $FILE_COUNT"
          
          if [ "$FILE_COUNT" -lt 1 ]; then
            echo "ERROR: No se encontraron archivos en ${{ env.OUTPUT_LOCATION }}/"
            exit 1
          fi
          
          # Check Azure limit
          if [ "$FILE_COUNT" -gt 14000 ]; then
            echo "::warning::${{ env.OUTPUT_LOCATION }} has $FILE_COUNT files (Azure limit 15000). Consider reducing build output."
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: ${{ env.OUTPUT_LOCATION }}

  # ==========================================================================
  # STAGE 3: DEPLOY
  # ==========================================================================
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
    environment:
      name: ${{ inputs.environment }}
    # Azure action usa APP_LOCATION; debe apuntar a la carpeta del artifact (dist)
    env:
      APP_LOCATION: ${{ inputs.output_location }}

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: ${{ env.APP_LOCATION }}

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ github.token }}
          action: "upload"
          app_location: ${{ env.APP_LOCATION }}
          output_location: ""
          skip_app_build: true
