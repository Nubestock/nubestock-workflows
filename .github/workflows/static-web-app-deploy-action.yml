# Workflow reutilizable: build y deploy de Azure Static Web App
# Variables de build (VITE_*) se toman del environment y se inyectan en el build.
name: Deploy Azure Static Web App - Reusable Workflow

on:
  workflow_call:
    inputs:
      environment:
        description: "Environment a desplegar (ej. NUBESTOCK_DEV, NUBESTOCK_UAT, NUBESTOCK_PRD)"
        required: true
        type: string
      node_version:
        description: "Versión de Node.js para el build"
        required: false
        type: string
        default: "20"
      app_location:
        description: "Ruta del código de la app (relativa al repo)"
        required: false
        type: string
        default: "/"
      output_location:
        description: "Carpeta de salida del build (ej. dist)"
        required: false
        type: string
        default: "dist"
    secrets:
      # Token de deploy del Static Web App (desde Azure Portal)
      AZURE_STATIC_WEB_APPS_API_TOKEN:
        required: true
      # Para integraciones (comentarios en PRs); el caller pasa secrets.GITHUB_TOKEN
      GITHUB_TOKEN:
        required: true
      # Variables de build (Vite/React) - se inyectan en el build desde el environment
      VITE_API_BASE_URL:
        required: false
      VITE_API_TIMEOUT:
        required: false
      # Código para invocar el backend (?code=). Mismo valor que APP_KEY del backend.
      VITE_API_CODE:
        required: false
      # Token de SonarCloud para análisis de calidad
      SONAR_TOKEN:
        required: false

env:
  NODE_VERSION: ${{ inputs.node_version }}
  APP_LOCATION: ${{ inputs.app_location }}
  OUTPUT_LOCATION: ${{ inputs.output_location }}

jobs:
  quality:
    name: Quality (tests + Sonar)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
        env:
          NODE_OPTIONS: '--experimental-vm-modules'

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Wait for Sonar analysis
        run: sleep 15

      - name: Validate Sonar conditions
        run: |
          PROJECT_KEY=$(grep '^sonar.projectKey=' sonar-project.properties | cut -d= -f2)
          echo "Getting metrics for component: $PROJECT_KEY"
          METRICS=$(curl -s -u "$SONAR_TOKEN": \
            "https://sonarcloud.io/api/measures/component?component=$PROJECT_KEY&metricKeys=coverage,bugs,vulnerabilities")

          COVERAGE=$(echo "$METRICS" | jq -r '.component.measures[] | select(.metric=="coverage") | .value // "0"')
          BUGS=$(echo "$METRICS" | jq -r '.component.measures[] | select(.metric=="bugs") | .value // "0"')
          VULNERABILITIES=$(echo "$METRICS" | jq -r '.component.measures[] | select(.metric=="vulnerabilities") | .value // "0"')

          COVERAGE=${COVERAGE:-0}
          BUGS=${BUGS:-0}
          VULNERABILITIES=${VULNERABILITIES:-0}

          echo "Coverage: $COVERAGE%"
          echo "Bugs: $BUGS"
          echo "Vulnerabilities: $VULNERABILITIES"

          FAIL=0

          if (( $(echo "$COVERAGE < 80" | bc -l) )); then
            echo "Coverage below 80%"
            FAIL=1
          fi

          if [ "$BUGS" -gt 1 ]; then
            echo "More than 1 bug detected"
            FAIL=1
          fi

          if [ "$VULNERABILITIES" -gt 0 ]; then
            echo "Security vulnerabilities detected"
            FAIL=1
          fi

          if [ "$FAIL" -eq 1 ]; then
            echo "Sonar validation failed"
            exit 1
          else
            echo "Sonar validation passed"
          fi
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  build_and_deploy:
    runs-on: ubuntu-latest
    needs: quality
    permissions:
      contents: read
    environment:
      name: ${{ inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (con variables del environment)
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_API_TIMEOUT: ${{ secrets.VITE_API_TIMEOUT }}
          VITE_API_CODE: ${{ secrets.VITE_API_CODE }}
        run: npm run build

      - name: Generate staticwebapp.config.json (proxy al backend)
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
        run: |
          if [ -n "$VITE_API_BASE_URL" ]; then
            cat > ${{ env.OUTPUT_LOCATION }}/staticwebapp.config.json << EOF
          {
            "routes": [
              {
                "route": "/api/*",
                "rewrite": "${VITE_API_BASE_URL}/*"
              }
            ]
          }
          EOF
            echo "staticwebapp.config.json generado con backend: $VITE_API_BASE_URL"
            cat ${{ env.OUTPUT_LOCATION }}/staticwebapp.config.json
          else
            echo "VITE_API_BASE_URL no configurado - no se genera proxy"
          fi

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: ${{ env.APP_LOCATION }}
          output_location: ${{ env.OUTPUT_LOCATION }}
          skip_app_build: true
